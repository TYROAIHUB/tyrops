<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TYROps</title>
  <script>
    // SPA redirect for GitHub Pages
    // Saves the full URL then redirects to index.html which picks it up
    sessionStorage.redirect = location.href;
    location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
  </script>
</head>
<body></body>
</html>
